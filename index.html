<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momento — Demo</title>
  <link rel="stylesheet" href="./src/styles/app.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- Demo mode: no Firebase, no backend API -->

  <script src="./vendor/react.production.min.js"></script>
  <script src="./vendor/react-dom.production.min.js"></script>
  <script src="./src/books.bundled.js?v=66"></script>
  <script src="./src/books.covers.js?v=66"></script>
  <script src="./src/books.catalog.js?v=66"></script>
  <script>
    /* Clear old text-format book caches so EPUB HTML is fetched fresh */
    try {
      Object.keys(localStorage).forEach(function(k) {
        if (!k.startsWith('momento_book_')) return;
        try {
          var b = JSON.parse(localStorage.getItem(k));
          if (b && b.pages && b.pages.length && !b.pages[0].html) {
            localStorage.removeItem(k);
          }
        } catch(e) { localStorage.removeItem(k); }
      });
    } catch(e) {}
  </script>
  <script src="./src/app.compiled.js?v=66"></script>
</body>
</html>
